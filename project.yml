name: MoniArc
options:
  bundleIdPrefix: com.zhengzipeng
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
targets:
  MoniArc:
    type: application
    platform: macOS
    sources:
      - path: MoniArc
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhengzipeng.MoniArc
        PRODUCT_NAME: MoniArc
        PRODUCT_MODULE_NAME: MoniArc
        INFOPLIST_FILE: MoniArc/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - sdk: libsqlite3.tbd
      - sdk: CoreServices.framework
    scheme:
      testTargets:
        - MoniArcTests
      gatherCoverageData: true
  MoniArcTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MoniArcTests
    dependencies:
      - target: MoniArc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zhengzipeng.MoniArcTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MoniArc.app/Contents/MacOS/MoniArc"
        BUNDLE_LOADER: "$(TEST_HOST)"
