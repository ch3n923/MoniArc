name: Feature request
description: 提议一个聚焦、隐私安全的新能力
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 请先描述使用场景，而不是直接描述实现。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: 隐私与本地数据影响
      description: 说明是否需要读取新的文件、进程或网络数据。
    validations:
      required: true
