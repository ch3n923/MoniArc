name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Show tool versions
        run: |
          xcodebuild -version
          xcodegen --version
      - name: Validate release metadata and scripts
        run: ./scripts/check-release-readiness.sh
      - name: Run tests
        run: |
          xcodebuild -project MoniArc.xcodeproj \
            -scheme MoniArc \
            -destination 'platform=macOS' \
            test CODE_SIGNING_ALLOWED=NO
      - name: Build release configuration
        run: |
          xcodebuild -project MoniArc.xcodeproj \
            -scheme MoniArc \
            -configuration Release \
            -derivedDataPath build/CIRelease \
            build CODE_SIGNING_ALLOWED=NO
          ./scripts/verify-built-app.sh \
            build/CIRelease/Build/Products/Release/MoniArc.app
      - name: Smoke-test local DMG packaging
        run: ./scripts/build-local-dmg.sh
